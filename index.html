// ── TassenBadge ────────────────────────────────────────────────
function TassenBadge({count}) {
  if (!count) return null;
  return div({style:{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:W(0.7),padding:"6px 10px",borderRadius:3}},
    span({style:{fontSize:17}}, "☕"),
    span({style:{fontFamily:"'Libre Baskerville',serif",fontSize:14,fontWeight:700}}, count)
  );
}

// ── Weltkarte ─────────────────────────────────────────────────
function Weltkarte({laender}) {
  if (!laender || laender.length === 0) {
    return div({style:{padding:"12px",textAlign:"center",color:W(0.25),fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase"}}, "Keine Herkunftsl\u00e4nder angegeben");
  }

// ── PinModal ──────────────────────────────────────────────────
function PinModal({onErfolg, onAbbrechen}) {
  const [pin, setPin] = useState("");
  const [fehler, setFehler] = useState(false);
  const ok = async () => {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    if (hex === ADMIN_HASH) onErfolg(false);
    else if (hex === TEST_HASH) onErfolg(true);
    else { setFehler(true); setPin(""); setTimeout(() => setFehler(false), 900); }
  };
  return div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:24},className:"fade-in"},
    div({style:{background:"#251508",border:"1px solid rgba(160,120,50,0.4)",borderRadius:4,padding:"30px 24px",width:"100%",maxWidth:300,textAlign:"center"}},
      div({style:{fontFamily:"'Caveat',cursive",fontSize:26,color:"#fff",marginBottom:4}}, "Zugang"),
      div({style:{fontSize:12,color:W(0.4),letterSpacing:"0.1em",margin:"8px 0 18px"}}, "PIN eingeben"),
      inp({type:"password",inputMode:"numeric",autoFocus:true,value:pin,
        onChange:e=>setPin(e.target.value),
        onKeyDown:e=>e.key==="Enter"&&ok(),
        style:{...INP_STYLE,textAlign:"center",fontSize:26,letterSpacing:"0.4em",marginBottom:fehler?10:16,border:`1px solid ${fehler?"#c04040":"rgba(160,120,50,0.4)"}`},
        placeholder:"····"}),
      fehler && div({style:{fontSize:12,color:"#e07070",marginBottom:12}}, "Falscher PIN"),
      div({style:{display:"flex",gap:8}},
        btn({onClick:onAbbrechen,style:{flex:1,background:"transparent",border:"1px solid rgba(160,120,50,0.3)",color:"rgba(180,148,90,0.55)",fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",padding:"12px",cursor:"pointer",borderRadius:3}}, "Abbrechen"),
        btn({onClick:ok,style:{flex:1,background:SAND,border:"none",color:BROWN,fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",padding:"12px",cursor:"pointer",borderRadius:3,fontWeight:700}}, "OK")
      )
    )
  );
}

// ── QrModal ───────────────────────────────────────────────────
function QrModal({onSchliessen}) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d"); const s = 220; c.width = s; c.height = s;
    const img = new Image(); img.crossOrigin = "anonymous";
    img.onload = () => { ctx.fillStyle="#1a0c04"; ctx.fillRect(0,0,s,s); ctx.drawImage(img,0,0,s,s); };
    img.onerror = () => { ctx.fillStyle="#1a0c04"; ctx.fillRect(0,0,s,s); ctx.fillStyle=W(0.5); ctx.font="12px sans-serif"; ctx.textAlign="center"; ctx.fillText("QR nicht verfügbar",s/2,s/2); };
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://heissgetraenke.netlify.app&color=d4b483&bgcolor=1a0c04&margin=2`;
  }, []);
  return div({onClick:onSchliessen,style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:24},className:"fade-in"},
    div({onClick:e=>e.stopPropagation(),style:{background:"#251508",border:"1px solid rgba(160,120,50,0.4)",borderRadius:4,padding:"24px 20px",maxWidth:290,width:"100%",textAlign:"center"}},
      div({style:{fontFamily:"'Caveat',cursive",fontSize:24,color:"#fff",marginBottom:2}}, "Dennis’ Heißgetränke"),
      div({style:{fontSize:11,color:"rgba(180,148,90,0.4)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:16}}, "heissgetraenke.netlify.app"),
      div({style:{display:"inline-block",padding:8,border:"1px solid rgba(160,120,50,0.3)",borderRadius:3,marginBottom:14}},
        h('canvas', {ref, style:{display:"block",width:180,height:180}})
      ),
      div({style:{fontSize:12,color:W(0.35),marginBottom:16}}, "Kamera draufhalten zum Öffnen"),
      btn({onClick:onSchliessen,style:{background:"transparent",border:"1px solid rgba(255,255,255,0.2)",color:W(0.45),fontSize:12,letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 24px",cursor:"pointer",borderRadius:3}}, "Schließen")
    )
  );
}

// ── KommentarSektion ──────────────────────────────────────────

  const [offen, setOffen] = useState(false);
  const [formOffen, setFormOffen] = useState(false);
  const [text, setText] = useState("");
  const [name, setName] = useState("");
  const MAX = 300;
  const absenden = () => {
    if (!text.trim()) return;
    onHinzufuegen(text.trim(), name.trim());
    setText(""); setName(""); setFormOffen(false);
  };
  const INP2 = {width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",color:"#f0ece0",fontSize:14,padding:"9px 12px",borderRadius:3,outline:"none",boxSizing:"border-box"};
  
  return div({style:{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(160,120,50,0.15)"}},
    btn({onClick:()=>setOffen(!offen),style:{background:"transparent",border:"1px dashed rgba(200,144,42,0.25)",color:W(0.4),fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",padding:"9px 14px",cursor:"pointer",borderRadius:3,width:"100%"}},
      kommentare.length > 0 ? `${kommentare.length} Kommentar${kommentare.length!==1?"e":""} ${offen?"▲":"▼"}` : `Kommentar schreiben ${offen?"▲":"▼"}`
    ),
    offen && div({style:{marginTop:8},className:"slide-up"},
      ...kommentare.map(k => div({key:k.id,style:{background:"rgba(40,20,5,0.4)",borderRadius:3,padding:"10px 12px",marginBottom:6,border:"1px solid rgba(160,120,50,0.2)"}},
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
          div({style:{display:"flex",gap:8,alignItems:"baseline"}},
            span({style:{fontFamily:"'Caveat',cursive",fontSize:17,color:"#fff",fontWeight:600}}, k.name),
            span({style:{fontSize:10,color:W(0.3)}}, k.datum)
          ),
          isAdmin && btn({onClick:()=>onLoeschen(k.id),style:{background:"none",border:"none",color:"rgba(200,80,80,0.7)",fontSize:14,cursor:"pointer",padding:"0 2px"}}, "×")
        ),
        div({style:{fontSize:14,color:W(0.8),lineHeight:1.5}}, k.text)
      )),
      offen && (formOffen
        ? div({style:{background:"rgba(255,255,255,0.04)",borderRadius:3,padding:"12px",border:"1px solid rgba(255,255,255,0.1)"}},
            inp({value:name,onChange:e=>setName(e.target.value),placeholder:"Dein Name (optional)",style:{...INP2,marginBottom:7}}),
            h('textarea',{value:text,onChange:e=>setText(e.target.value.slice(0,MAX)),placeholder:"Dein Kommentar… (max. 300 Zeichen)",rows:2,style:{...INP2,resize:"none",marginBottom:3}}),
            div({style:{fontSize:10,color:W(0.22),textAlign:"right",marginBottom:8}}, `${text.length}/${MAX}`),
            div({style:{display:"flex",gap:7}},
              btn({onClick:()=>{setFormOffen(false);setText("");setName("");},style:{flex:1,background:"transparent",border:"1px solid rgba(255,255,255,0.15)",color:W(0.4),fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",padding:"10px",cursor:"pointer",borderRadius:3}}, "Abbrechen"),
              btn({onClick:absenden,style:{flex:2,background:text.trim()?W(0.88):"rgba(255,255,255,0.15)",border:"none",color:text.trim()?"#1c1c1c":W(0.35),fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",padding:"10px",cursor:text.trim()?"pointer":"default",borderRadius:3,fontWeight:700}}, "Absenden")
            )
          )
        : btn({onClick:()=>setFormOffen(true),style:{marginTop:7,background:"transparent",border:"1px solid rgba(255,255,255,0.15)",color:W(0.4),fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",padding:"8px 14px",cursor:"pointer",borderRadius:3,width:"100%"}}, "+ Kommentar schreiben")
      )
    )
  );
}

// ── Karte ─────────────────────────────────────────────────────
function Karte({item,istTee,isAdmin,onLoeschen,onBestellen,onBearbeiten,onToggleStock,tassenCount,kommentare,onKommentarHinzufuegen,onKommentarLoeschen}) {
  const [zubereitungOffen, setZubereitungOffen] = useState(false);
  const [karteOffen, setKarteOffen] = useState(false);
  const [loeschConf, setLoeschConf] = useState(false);
  const akzent = istTee ? (TEE_HEX[item.sorte]||"#4a7028") : (ROEST_HEX[item.roest]||"#6b3a1f");
  const zeilen = istTee
    ? [["Menge",item.params.menge],["Temperatur",item.params.temp],["Ziehzeit",item.params.ziehzeit]]
    : [["Mahlgrad",(()=>{ const m=item.params.mahlgrad; const d=m<=10?Math.round(m*3):Math.round(m); return `${d}/30`; })()],["Dosis",item.params.dosis],["Temperatur",item.params.temp],["Brühzeit",item.params.zeit],["Aufguss",(()=>{
    const ratio = item.params.ratio||"";
    const dosis = item.params.dosis||"";
    // Parse ratio number: "1:2,25" → 2.25
    const rMatch = ratio.match(/1[:/]([\d,\.]+)/);
    const rNum = rMatch ? parseFloat(rMatch[1].replace(",",".")) : null;
    // Parse dosis max: "17,5-18g" or "18g" → 18
    const dMatch = dosis.match(/([\d,\.]+)[^\d,\.]*(?:[-–]([\d,\.]+))?/);
    const dNum = dMatch ? parseFloat((dMatch[2]||dMatch[1]).replace(",",".")) : null;
    if(rNum && dNum) {
      const output = Math.round(dNum * rNum);
      return `${ratio}  ≈ ${output}g`;
    }
    return ratio;
  })()]];

  return div({style:{background:item.outOfStock?"rgba(40,12,8,0.55)":"rgba(61,32,16,0.2)",border:`1px solid ${item.outOfStock?"rgba(160,120,60,0.3)":"rgba(160,120,60,0.2)"}`,borderRadius:3,marginBottom:14,overflow:"hidden",opacity:item.outOfStock?0.78:1,position:"relative"},className:"slide-up"},
    div({style:{height:3,background:akzent,opacity:0.85}}),
    item.outOfStock && div({
      onClick: isAdmin ? ()=>onToggleStock(item.id) : undefined,
      style:{
        position:"absolute", inset:0,
        background:"rgba(20,8,2,0.45)",
        pointerEvents: isAdmin ? "auto" : "none", zIndex:10,
        overflow:"hidden",
        display:"flex", alignItems:"center", justifyContent:"center",
        cursor: isAdmin ? "pointer" : "default",
      }},
      div({style:{
        width:"120%",
        padding:"11px 0",
        background:"rgba(42,22,8,0.93)",
        color:"rgba(212,180,131,0.95)",
        fontSize:14, fontWeight:700, letterSpacing:"0.25em",
        textTransform:"uppercase", textAlign:"center",
        transform:"rotate(-32deg)",
        borderTop:"1px solid rgba(180,140,70,0.5)",
        borderBottom:"1px solid rgba(180,140,70,0.5)",
        boxShadow:"0 4px 20px rgba(0,0,0,0.7)",
        fontFamily:"'Barlow Condensed',sans-serif",
        textShadow:"1px 1px 4px rgba(0,0,0,0.8)",
        flexShrink:0,
      }}, isAdmin?"Ausverkauft  \u2014  Tippen":("Ausverkauft"))
    ),
    item.bild && div({style:{height:150,overflow:"hidden"}},
      h('img',{src:item.bild,alt:item.name,style:{width:"100%",height:"100%",objectFit:"cover",opacity:0.72}})
    ),
    div({style:{padding:"14px 16px"}},
      // Header row
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:10}},
        div({style:{flex:1,minWidth:0}},
          div({style:{display:"flex",alignItems:"center",gap:8,marginBottom:2,flexWrap:"wrap"}},
            div({style:{fontFamily:"'Caveat',cursive",fontSize:28,color:item.outOfStock?"rgba(200,100,100,0.8)":"#fff",fontWeight:700,lineHeight:1.1}}, item.name),

          ),
          div({style:{fontSize:12,color:"rgba(180,148,90,0.6)",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:8}}, item.subtitle),
          div({style:{display:"flex",flexWrap:"wrap",gap:5}},
            span({style:{display:"inline-block",background:akzent,color:"#f8f0e4",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",padding:"3px 9px",borderRadius:2}}, istTee?item.sorte:item.roest),
            !istTee && span({style:{fontSize:11,color:W(0.35),letterSpacing:"0.08em",textTransform:"uppercase"}}, item.typ)
          )
        ),
        div({style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,flexShrink:0}},
          div({style:{textAlign:"center"}},
            div({style:{fontSize:9,color:W(0.3),letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}, istTee?"Stärke":"Röstung"),
            div({style:{display:"flex",gap:4}},
              ...[0,1,2,3,4].map(i => {
                const filled = i < Math.floor(item.intensitaet);
                const half = !filled && i < item.intensitaet;
                return div({key:i,style:{
                  width:9,height:9,borderRadius:"50%",
                  border:"1.5px solid rgba(180,148,90,0.5)",
                  position:"relative",overflow:"hidden",
                  background:filled?SAND:"transparent"
                }},
                  half && div({style:{
                    position:"absolute",left:0,top:0,
                    width:"50%",height:"100%",
                    background:SAND
                  }})
                );
              })
            )
          ),
          h(TassenBadge, {count:tassenCount}),
          isAdmin && (loeschConf
            ? div({style:{display:"flex",gap:5}},
                btn({onClick:()=>setLoeschConf(false),style:{fontSize:11,background:"transparent",border:"1px solid rgba(255,255,255,0.18)",color:W(0.4),padding:"5px 9px",cursor:"pointer",borderRadius:2}}, "Nein"),
                btn({onClick:()=>onLoeschen(item.id),style:{fontSize:11,background:"rgba(160,30,30,0.5)",border:"none",color:"#fdd",padding:"5px 9px",cursor:"pointer",borderRadius:2}}, "Löschen")
              )
            : div({style:{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}},
                btn({
                  onClick:()=>onToggleStock(item.id),
                  style:{fontSize:11,background:item.outOfStock?"rgba(40,120,40,0.4)":"rgba(120,40,40,0.25)",
                    border:`1px solid ${item.outOfStock?"rgba(80,160,80,0.5)":"rgba(180,60,60,0.4)"}`,
                    color:item.outOfStock?"rgba(140,220,140,0.9)":"rgba(220,100,100,0.8)",
                    padding:"5px 9px",cursor:"pointer",borderRadius:2,width:"100%",textAlign:"center"}
                }, item.outOfStock?"✓ Verfügbar":"Ausverkauft"),
                div({style:{display:"flex",gap:5}},
                  btn({onClick:()=>onBearbeiten(item),style:{fontSize:11,background:"transparent",border:"1px solid rgba(160,120,50,0.3)",color:"rgba(180,148,90,0.65)",padding:"4px 9px",cursor:"pointer",borderRadius:2}}, "Bearb."),
                  btn({onClick:()=>setLoeschConf(true),style:{fontSize:11,background:"transparent",border:"1px solid rgba(200,60,60,0.3)",color:"rgba(220,100,100,0.8)",padding:"4px 9px",cursor:"pointer",borderRadius:2}}, "Löschen")
                )
              )
          )
        )
      ),
      // Aromen
      div({style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(255,255,255,0.07)"}},
        ...(item.aromen||[]).map(a => span({key:a,style:{fontSize:12,color:W(0.65),background:"rgba(80,50,20,0.3)",border:"1px solid rgba(160,120,60,0.3)",borderRadius:2,padding:"5px 11px",letterSpacing:"0.05em",textTransform:"uppercase"}}, a))
      ),
      // Buttons
      div({style:{display:"flex",gap:7}},
        btn({
          onClick:()=>{setZubereitungOffen(!zubereitungOffen);setKarteOffen(false);},
          style:{flex:1,background:"transparent",border:`1px solid ${zubereitungOffen?"rgba(200,160,80,0.7)":"rgba(160,120,50,0.3)"}`,color:zubereitungOffen?"#e8d0a0":"rgba(160,128,72,0.6)",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",padding:"11px 5px",cursor:"pointer",borderRadius:3,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:3}
        }, span(null,"Zubereitung"), span(null,zubereitungOffen?"▲":"▼")),
        (item.laender||[]).length > 0 && btn({
          onClick:()=>{setKarteOffen(!karteOffen);setZubereitungOffen(false);},
          style:{flex:1,background:"transparent",border:`1px solid ${karteOffen?"rgba(200,160,80,0.7)":"rgba(160,120,50,0.3)"}`,color:karteOffen?"#e8d0a0":"rgba(160,128,72,0.6)",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",padding:"11px 5px",cursor:"pointer",borderRadius:3,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:3}
        }, span(null,"Herkunft"), span(null,karteOffen?"▲":"▼")),
        btn({onClick:()=>!item.outOfStock&&onBestellen(item),style:{flex:2,background:item.outOfStock?"rgba(80,60,40,0.3)":SAND,border:item.outOfStock?"1px solid rgba(200,144,42,0.15)":"none",color:item.outOfStock?C(0.3):BROWN,fontFamily:"'Caveat',cursive",fontSize:item.outOfStock?14:20,fontWeight:700,padding:"8px 5px",cursor:item.outOfStock?"not-allowed":"pointer",borderRadius:3,letterSpacing:item.outOfStock?"0.1em":"0",textTransform:item.outOfStock?"uppercase":"none"}}, item.outOfStock?"Ausverkauft":"Bestellen")
      ),
      // Zubereitung panel
      zubereitungOffen && div({style:{marginTop:10,padding:"12px 14px",background:"rgba(20,8,2,0.6)",borderRadius:3,border:"1px solid rgba(160,120,50,0.2)"},className:"slide-up"},
        div({style:{fontSize:10,color:"rgba(190,155,90,0.7)",letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:10,fontWeight:700}}, istTee?"Zubereitung":"Rezept — Siebträger"),
        ...zeilen.map(([l,v]) => div({key:l,style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",paddingBottom:7,marginBottom:7,borderBottom:"1px dotted rgba(160,120,50,0.15)"}},
          span({style:{fontSize:12,color:W(0.4),letterSpacing:"0.1em",textTransform:"uppercase"}}, l),
          span({style:{fontSize:17,color:"#fff",fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}, v)
        ))
      ),
      // Herkunft panel
      karteOffen && div({style:{marginTop:10,padding:"12px 14px",background:"rgba(20,8,2,0.6)",borderRadius:3,border:"1px solid rgba(160,120,50,0.2)"},className:"slide-up"},
        div({style:{fontSize:10,color:"rgba(190,155,90,0.7)",letterSpacing:"0.18em",textTransform:"uppercase",marginBottom:10,fontWeight:700}}, "Anbaugebiet"),
        h(Weltkarte, {laender:item.laender||[]})
      ),
      // Kommentare
      h(KommentarSektion, {kommentare, isAdmin, onHinzufuegen:onKommentarHinzufuegen, onLoeschen:onKommentarLoeschen})
    )
  );
}

// ── Formular ──────────────────────────────────────────────────
function Formular({istTee, onSpeichern, onAbbrechen, editData=null, editModus=false}) {
  const init = editData ? {
    name:editData.name||"",subtitle:editData.subtitle||"",
    roest:editData.roest||"Mitteldunkel",sorte:editData.sorte||"Schwarzer Tee",typ:editData.typ||"Blend",
    a1:(editData.aromen||[])[0]||"",a2:(editData.aromen||[])[1]||"",a3:(editData.aromen||[])[2]||"",
    intensitaet:editData.intensitaet||3,
    dosis:editData.params?.dosis||"",temp:parseFloat(editData.params?.temp)||"",
    zeit:editData.params?.zeit||"",ratio:editData.params?.ratio||"1:2",mahlgrad:String(editData.params?.mahlgrad||6),
    menge:editData.params?.menge||"3g",ziehzeit:editData.params?.ziehzeit||"3 Min.",
    bild:editData.bild||null,laender:editData.laender||[]
  } : {name:"",subtitle:"",roest:"Mitteldunkel",sorte:"Schwarzer Tee",typ:"Blend",a1:"",a2:"",a3:"",intensitaet:3,dosis:"",temp:istTee?"90":"92",zeit:"",ratio:"1:2",mahlgrad:"6",menge:"3g",ziehzeit:"3 Min.",bild:null,laender:[]};
  
  const [f, setF] = useState(init);
  const s = (k,v) => setF(p => ({...p,[k]:v}));
  const [neuLand, setNeuLand] = useState("");
  const [cropSrc, setCropSrc] = useState(null);
  const addLand = () => { const t=neuLand.trim(); if(!t||f.laender.includes(t))return; setF(p=>({...p,laender:[...p.laender,t]})); setNeuLand(""); };
  const removeLand = l => setF(p=>({...p,laender:p.laender.filter(x=>x!==l)}));
  const bildRef = useRef();

  return div({style:{background:"rgba(40,18,4,0.4)",border:"1px solid rgba(160,120,50,0.25)",borderRadius:3,padding:"16px",marginBottom:14}},
    cropSrc && h(ImageCropper, {src:cropSrc, onSave:b=>{s("bild",b);setCropSrc(null);}, onAbbrechen:()=>setCropSrc(null)}),
    div({style:{fontFamily:"'Caveat',cursive",fontSize:22,color:"#fff",marginBottom:12}}, editModus?(istTee?"Tee bearbeiten":"Kaffee bearbeiten"):(istTee?"Neuen Tee eintragen":"Neuen Kaffee eintragen")),
    div({onClick:()=>bildRef.current.click(),style:{height:90,border:"1.5px dashed rgba(160,120,50,0.3)",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginBottom:5,overflow:"hidden",background:"rgba(0,0,0,0.2)"}},
      f.bild ? h('img',{src:f.bild,style:{width:"100%",height:"100%",objectFit:"cover"}}) : div({style:{textAlign:"center",color:W(0.28),fontSize:12,letterSpacing:"0.15em",textTransform:"uppercase"}}, "Bild hochladen")
    ),
    f.bild && div({onClick:()=>s("bild",null),style:{fontSize:11,color:"rgba(200,100,80,0.7)",cursor:"pointer",textAlign:"right",marginBottom:5,letterSpacing:"0.1em",textTransform:"uppercase"}}, "Entfernen"),
    h('input',{type:"file",accept:"image/*",ref:bildRef,onChange:ev=>{const d=ev.target.files[0];if(!d)return;const r=new FileReader();r.onload=x=>setCropSrc(x.target.result);r.readAsDataURL(d);}}),
    div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Name"),
    inp({style:INP_STYLE,value:f.name,onChange:ev=>s("name",ev.target.value),placeholder:istTee?"z.B. Darjeeling First Flush":"z.B. Ethiopia Yirgacheffe"}),
    div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Herkunft / Beschreibung"),
    inp({style:INP_STYLE,value:f.subtitle,onChange:ev=>s("subtitle",ev.target.value),placeholder:"z.B. Indien · 100% Arabica"}),
    istTee
      ? [div({key:"sl",style:{fontSize:10,color:W(0.55),letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Teesorte"),
         h('select',{key:"ss",style:INP_STYLE,value:f.sorte,onChange:ev=>s("sorte",ev.target.value)}, ...TEE_SORTEN.map(t=>h('option',{key:t},t)))]
      : div({style:{display:"flex",gap:8}},
          div({style:{flex:1}},
            div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Röstgrad"),
            h('select',{style:INP_STYLE,value:f.roest,onChange:ev=>s("roest",ev.target.value)}, ...ROESTGRADE.map(r=>h('option',{key:r},r)))
          ),
          div({style:{flex:1}},
            div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Typ"),
            h('select',{style:INP_STYLE,value:f.typ,onChange:ev=>s("typ",ev.target.value)}, h('option',null,"Blend"), h('option',null,"Single-Origin"))
          )
        ),
    div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Herkunftsländer"),
    div({style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}},
      ...f.laender.map(l => span({key:l,style:{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"#dccfa8",background:"rgba(80,45,10,0.5)",border:"1px solid rgba(160,120,50,0.35)",borderRadius:2,padding:"4px 8px"}},
        l, btn({onClick:()=>removeLand(l),style:{background:"none",border:"none",color:W(0.5),cursor:"pointer",fontSize:13,padding:"0 0 0 3px",lineHeight:1}}, "×")
      ))
    ),
    div({style:{display:"flex",gap:6}},
      inp({style:{...INP_STYLE,flex:1},value:neuLand,onChange:e=>setNeuLand(e.target.value),onKeyDown:e=>e.key==="Enter"&&addLand(),placeholder:"z.B. Indien, Äthiopien…"}),
      btn({onClick:addLand,style:{background:"rgba(80,45,10,0.4)",border:"1px solid rgba(160,120,50,0.3)",color:"rgba(200,165,100,0.8)",fontSize:12,letterSpacing:"0.08em",textTransform:"uppercase",padding:"0 12px",cursor:"pointer",borderRadius:3,whiteSpace:"nowrap"}}, "+ Hinzu")
    ),
    div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Aromen (bis zu 3)"),
    div({style:{display:"flex",gap:7}},
      ...["a1","a2","a3"].map((k,i) => inp({key:k,style:{...INP_STYLE,flex:1},value:f[k],onChange:ev=>s(k,ev.target.value),placeholder:String(i+1)}))
    ),
    div({style:{fontSize:10,color:"rgba(180,148,90,0.6)",letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, `Intensität: ${f.intensitaet}/5`),
    inp({type:"range",min:"1",max:"5",step:"0.5",value:f.intensitaet,onChange:ev=>s("intensitaet",parseFloat(ev.target.value)),style:{width:"100%",height:5,accentColor:SAND}}),
    istTee
      ? [div({key:"tl",style:{fontSize:10,color:W(0.55),letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Menge · Temperatur (°C) · Ziehzeit"),
         div({key:"ti",style:{display:"flex",gap:7}},
           inp({style:{...INP_STYLE,flex:1},value:f.menge,onChange:ev=>s("menge",ev.target.value),placeholder:"3g"}),
           inp({style:{...INP_STYLE,flex:1},value:f.temp,onChange:ev=>s("temp",ev.target.value),placeholder:"85"}),
           inp({style:{...INP_STYLE,flex:1},value:f.ziehzeit,onChange:ev=>s("ziehzeit",ev.target.value),placeholder:"3 Min."})
         )]
      : [div({key:"kl",style:{fontSize:10,color:W(0.55),letterSpacing:"0.2em",textTransform:"uppercase",display:"block",marginBottom:5,marginTop:14,fontWeight:600}}, "Dosis · Temperatur (°C) · Brühzeit"),
         div({key:"ki",style:{display:"flex",gap:7}},
           inp({style:{...INP_STYLE,flex:1},value:f.dosis,onChange:ev=>s("dosis",ev.target.value),placeholder:"18g"}),
           inp({style:{...INP_STYLE,flex:1},value:f.temp,onChange:ev=>s("temp",ev.target.value),placeholder:"92"}),

         ),

// ── ImageCropper ──────────────────────────────────────────────
function ImageCropper({src, onSave, onAbbrechen}) {
  const canvasRef = useRef(null);
  const [offset, setOffset] = useState({x:0,y:0});
  const [scale, setScale] = useState(1);
  const [dragging, setDragging] = useState(false);
  const [dragStart, setDragStart] = useState({x:0,y:0});
  const imgRef = useRef(null);
  const OW = 800, OH = 500;

  useEffect(() => {
    const img = new Image();
    img.onload = () => {
      imgRef.current = img;
      const s = Math.max(OW/img.width, OH/img.height);
      setScale(s);
      setOffset({x:(OW-img.width*s)/2, y:(OH-img.height*s)/2});
    };
    img.src = src;
  }, [src]);

  const draw = useCallback(() => {
    const canvas = canvasRef.current; if (!canvas||!imgRef.current) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle="#111"; ctx.fillRect(0,0,OW,OH);
    ctx.drawImage(imgRef.current, offset.x, offset.y, imgRef.current.width*scale, imgRef.current.height*scale);
  }, [offset, scale]);

  useEffect(() => { draw(); }, [draw]);

  const onDown = e => {
    setDragging(true);
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches?e.touches[0].clientX:e.clientX;
    const cy = e.touches?e.touches[0].clientY:e.clientY;
    setDragStart({x:cx-rect.left-offset.x*(rect.width/OW), y:cy-rect.top-offset.y*(rect.height/OH)});
  };
  const onMove = e => {
    if (!dragging) return; e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches?e.touches[0].clientX:e.clientX;
    const cy = e.touches?e.touches[0].clientY:e.clientY;
    const sx = OW/rect.width, sy = OH/rect.height;
    setOffset({x:(cx-rect.left-dragStart.x)*sx, y:(cy-rect.top-dragStart.y)*sy});
  };
  const save = () => { draw(); onSave(canvasRef.current.toDataURL("image/jpeg",0.85)); };

  return div({style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16},className:"fade-in"},
    div({style:{background:"#251508",border:"1px solid rgba(160,120,50,0.4)",borderRadius:4,padding:"16px",width:"100%",maxWidth:500}},
      div({style:{fontFamily:"'Caveat',cursive",fontSize:20,color:"#fff",marginBottom:4}}, "Bildausschnitt wählen"),
      div({style:{fontSize:11,color:W(0.35),marginBottom:10,letterSpacing:"0.06em"}}, "Ziehen zum Verschieben · Schieberegler zum Zoomen"),
      div({style:{borderRadius:3,overflow:"hidden",marginBottom:10,cursor:dragging?"grabbing":"grab",touchAction:"none",userSelect:"none"}},
        h('canvas',{ref:canvasRef,width:OW,height:OH,style:{width:"100%",height:"auto",display:"block"},
          onMouseDown:onDown,onMouseMove:onMove,onMouseUp:()=>setDragging(false),onMouseLeave:()=>setDragging(false),
          onTouchStart:onDown,onTouchMove:onMove,onTouchEnd:()=>setDragging(false)})
      ),
      div({style:{display:"flex",alignItems:"center",gap:10,marginBottom:14}},
        span({style:{fontSize:11,color:W(0.4),letterSpacing:"0.1em",textTransform:"uppercase",flexShrink:0}}, "Zoom"),
        inp({type:"range",min:"0.2",max:"3",step:"0.05",value:scale,onChange:e=>setScale(parseFloat(e.target.value)),style:{flex:1,height:4}}),
        span({style:{fontSize:12,color:W(0.5),minWidth:32}}, Math.round(scale*100)+"%")
      ),
      div({style:{display:"flex",gap:8}},
        btn({onClick:onAbbrechen,style:{flex:1,background:"transparent",border:"1px solid rgba(255,255,255,0.18)",color:W(0.45),fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",padding:"12px",cursor:"pointer",borderRadius:3}}, "Abbrechen"),
        btn({onClick:save,style:{flex:2,background:W(0.88),border:"none",color:"#1c1c1c",fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",padding:"12px",cursor:"pointer",borderRadius:3,fontWeight:700}}, "Ausschnitt übernehmen")
      )
    )
  );
}

function App() {
  const cache = ladeCache();
  const [kaffees, setKaffees] = useState(cache?.kaffees||STANDARD_KAFFEES);
  const [tees, setTees] = useState(cache?.tees||STANDARD_TEES);
  const [bestellungen, setBestellungen] = useState(cache?.bestellungen||[]);
  const [tassen, setTassen] = useState(cache?.tassen||{});
  const [kommentare, setKommentare] = useState(cache?.kommentare||[]);
  const [tab, setTab] = useState("kaffee");
  const [sortierung, setSortierung] = useState("alphabetisch");
  const [suche, setSuche] = useState("");
  const [sortAsc, setSortAsc] = useState(false);
  const [filterAroma, setFilterAroma] = useState(null);
  const [filterTeeSorte, setFilterTeeSorte] = useState(null);
  const [filterOffen, setFilterOffen] = useState(false);
  const [formularOffen, setFormularOffen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [bestellModal, setBestellModal] = useState(null);
  const [bestaetigt, setBestaetigt] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [testModus, setTestModus] = useState(false);
  const [pinAnzeigen, setPinAnzeigen] = useState(false);
  const [qrOffen, setQrOffen] = useState(false);
  const [speichert, setSpeichert] = useState(false);
  const [serverGeladen, setServerGeladen] = useState(!!cache);
  const [gastName, setGastName] = useState("");

  const serverLaden = useCallback(async () => {
    try {
      const d = await ladeVomServer();
      // Server data is authoritative - if it has items, use ONLY those
      // This prevents merging server data with local defaults (= duplicates)
      if(d.kaffees?.length>0) setKaffees(d.kaffees);
      if(d.tees?.length>0) setTees(d.tees);
      if(d.bestellungen?.length>0) setBestellungen(d.bestellungen);
      if(d.tassen&&Object.keys(d.tassen).length>0) setTassen(d.tassen);
      if(d.kommentare?.length>0) setKommentare(d.kommentare);
      // Save to cache
      speichereCache({
        kaffees: d.kaffees?.length>0 ? d.kaffees : kaffees,
        tees: d.tees?.length>0 ? d.tees : tees,
        bestellungen: d.bestellungen?.length>0 ? d.bestellungen : bestellungen,
        tassen: d.tassen&&Object.keys(d.tassen).length>0 ? d.tassen : tassen,
        kommentare: d.kommentare?.length>0 ? d.kommentare : kommentare,
      });
      setServerGeladen(true);
    } catch { setServerGeladen(true); }
  }, []);

  useEffect(() => { serverLaden(); }, []);

  // Echtzeit-Update: Im Admin-Modus alle 10 Sek. neue Bestellungen laden
  useEffect(() => {
    if (!isAdmin || testModus) return;
    const intervall = setInterval(async () => {
      try {
        const d = await ladeVomServer();
        if (d.bestellungen?.length > 0) setBestellungen(d.bestellungen);
        if (d.tassen && Object.keys(d.tassen).length > 0) setTassen(d.tassen);
      } catch {}
    }, 10000);
    return () => clearInterval(intervall);
  }, [isAdmin, testModus]);

  const postiereWennEcht = async (a,d) => { if(testModus)return; await poste(a,d); };
  const nachSpeichern = async (aktion, daten, neuerState) => {
    setSpeichert(true);
    await postiereWennEcht(aktion, daten);
    speichereCache({kaffees,tees,bestellungen,tassen,kommentare,...neuerState});
    setSpeichert(false);
  };

  const hinzufuegen = async (f, istTee) => {
    if (!f.name) return;
    const basis = {id:Date.now(),name:f.name,subtitle:f.subtitle,aromen:[f.a1,f.a2,f.a3].filter(Boolean),intensitaet:f.intensitaet,bild:f.bild,laender:f.laender||[],outOfStock:false};
    if (istTee) {
      const item = {...basis,sorte:f.sorte,params:{menge:f.menge||"3g",temp:(f.temp||"85")+"°C",ziehzeit:f.ziehzeit||"3 Min."}};
      const neu = [...tees,item]; setTees(neu); setFormularOffen(false);
      await nachSpeichern("tees_speichern",{tees:neu},{tees:neu});
    } else {
      const item = {...basis,roest:f.roest,typ:f.typ,params:{mahlgrad:f.mahlgrad||6,dosis:f.dosis||"18g",temp:(f.temp||"92")+"°C",zeit:f.zeit||"",ratio:f.ratio||"1:2"}};
      const neu = [...kaffees,item]; setKaffees(neu); setFormularOffen(false);
      await nachSpeichern("kaffees_speichern",{kaffees:neu},{kaffees:neu});
    }
  };

  const loeschen = async (id, istTee) => {
    if (istTee) { const neu=tees.filter(t=>t.id!==id); setTees(neu); await nachSpeichern("tees_speichern",{tees:neu},{tees:neu}); }
    else { const neu=kaffees.filter(k=>k.id!==id); setKaffees(neu); await nachSpeichern("kaffees_speichern",{kaffees:neu},{kaffees:neu}); }
  };

  // Deduplicate: keep item with highest id (most recently added) per name
  const deduplizieren = async () => {
    const dedup = (liste) => {
      const seen = new Map();
      // Go through in reverse so latest (highest id) wins
      [...liste].reverse().forEach(item => {
        if (!seen.has(item.name)) seen.set(item.name, item);
      });
      return [...seen.values()].reverse();
    };
    const neuK = dedup(kaffees);
    const neuT = dedup(tees);
    setKaffees(neuK);
    setTees(neuT);
    await nachSpeichern("kaffees_speichern", {kaffees:neuK}, {kaffees:neuK});
    await nachSpeichern("tees_speichern", {tees:neuT}, {tees:neuT});

          bestellungen.length === 0
            ? div({style:{textAlign:"center",padding:"50px 20px",color:"rgba(160,120,50,0.3)",fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase"}}, "Noch keine Bestellungen")
            : div(null, ...bestellungen.map((b,i) => div({key:i,style:{background:"rgba(40,18,4,0.3)",border:"1px solid rgba(160,120,50,0.2)",borderRadius:3,padding:"13px 15px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}},
                div(null,
                  div({style:{fontFamily:"'Caveat',cursive",fontSize:20,color:SAND,fontWeight:700}}, b.getraenk),
                  div({style:{fontSize:11,color:"rgba(180,148,90,0.5)",letterSpacing:"0.06em",textTransform:"uppercase",marginTop:3}}, (b.zubereitung?b.zubereitung+" \u2014 ":"")+b.typ),
                  div({style:{fontSize:11,color:"rgba(160,128,72,0.4)",marginTop:2}}, b.uhrzeit)
                ),
                div({style:{fontFamily:"'Caveat',cursive",fontSize:18,color:"rgba(200,165,100,0.65)",fontWeight:600,flexShrink:0,marginLeft:8}}, b.gast)
              )))
        );
      }
      // Kaffee or Tee tab
      return div({style:{padding:"14px 18px 0"}},
        div({style:{position:"relative",marginBottom:8}},
          h('input',{
            type:"search",
            value:suche,
            onChange:e=>setSuche(e.target.value),
            placeholder: istTeeTab ? "Tee suchen\u2026" : "Kaffee suchen\u2026",
            style:{width:"100%",background:"rgba(61,32,16,0.35)",border:"1px solid rgba(160,120,60,0.35)",color:"#dccfa8",fontSize:15,padding:"11px 38px 11px 14px",borderRadius:3,outline:"none",boxSizing:"border-box",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"0.04em"}
          }),
          suche && btn({onClick:()=>setSuche(""),style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}, "\u00d7")
        ),
        div({style:{display:"flex",gap:6,marginBottom:10,alignItems:"center"}},
          btn({onClick:()=>{if(sortierung==="alphabetisch"){setSortAsc(v=>!v);}else{setSortierung("alphabetisch");setSortAsc(false);}},style:chipSt(sortierung==="alphabetisch")},
            sortierung==="alphabetisch"?(sortAsc?"Z\u2013A":"A\u2013Z"):"A\u2013Z"),
          btn({onClick:()=>{if(sortierung==="intensitaet"){setSortAsc(v=>!v);}else{setSortierung("intensitaet");setSortAsc(false);}},style:chipSt(sortierung==="intensitaet")},
            sortierung==="intensitaet"?(sortAsc?"\u2193 St\u00e4rke":"\u2191 St\u00e4rke"):"St\u00e4rke"),
          btn({onClick:()=>{if(sortierung==="tassen"){setSortAsc(v=>!v);}else{setSortierung("tassen");setSortAsc(false);}},style:chipSt(sortierung==="tassen")},
            sortierung==="tassen"?(sortAsc?"\u2193 \u2615":"\u2191 \u2615"):"\u2615"),
          div({style:{flex:1}}),
          btn({onClick:()=>setFilterOffen(!filterOffen),style:{...chipSt(hatFilter),position:"relative",paddingRight:hatFilter?28:13}},
            "Filter "+(filterOffen?"\u25b2":"\u25bc"),
            hatFilter && span({style:{position:"absolute",top:4,right:6,width:7,height:7,borderRadius:"50%",background:"rgba(220,100,100,0.9)"}})
          )
        ),
        filterOffen && div({style:{background:"rgba(30,15,5,0.55)",border:"1px solid rgba(200,144,42,0.2)",borderRadius:3,padding:"12px 14px",marginBottom:10},className:"slide-up"},
          istTeeTab && alleTeeSorten.length > 1 ? [
            div({key:"tsl",style:{fontSize:10,color:"rgba(180,148,90,0.5)",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:6,fontWeight:700}}, "Teesorte"),
            div({key:"tsc",style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}, ...alleTeeSorten.map(s => btn({key:s,onClick:()=>setFilterTeeSorte(filterTeeSorte===s?null:s),style:chipSt(filterTeeSorte===s)}, s)))
          ] : null,
          alleAromen.length > 0 ? [
            div({key:"al",style:{fontSize:10,color:"rgba(180,148,90,0.5)",letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:6,fontWeight:700}}, "Geschmacksnote"),
            div({key:"ac",style:{display:"flex",flexWrap:"wrap",gap:5}}, ...alleAromen.map(a => btn({key:a,onClick:()=>setFilterAroma(filterAroma===a?null:a),style:chipSt(filterAroma===a)}, a)))
          ] : null,
          hatFilter ? btn({onClick:()=>{setFilterAroma(null);setFilterTeeSorte(null);},style:{marginTop:10,fontSize:12,background:"transparent",border:"none",color:"rgba(220,100,100,0.7)",cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase",padding:"4px 0"}}, "\u2715 Alle Filter l\u00f6schen") : null
        ),
        suche.trim() ? div({style:{fontSize:12,color:"rgba(180,148,90,0.4)",marginBottom:8,letterSpacing:"0.06em"}},
          aktItems.length===0 ? "Keine Treffer" : `${aktItems.length} Treffer f\u00fcr \u201e${suche}\u201c`
        ) : null,
        hatFilter && !filterOffen ? div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"8px 12px",background:"rgba(40,18,4,0.3)",borderRadius:3,border:"1px solid rgba(160,120,50,0.2)"}},
          span({style:{fontSize:12,color:"rgba(180,148,90,0.55)"}}, [filterTeeSorte,filterAroma].filter(Boolean).join(" \u00b7 ")+" \u2014 "+aktItems.length+" Treffer"),
          btn({onClick:()=>{setFilterAroma(null);setFilterTeeSorte(null);},style:{fontSize:13,background:"transparent",border:"none",color:"rgba(220,100,100,0.7)",cursor:"pointer",padding:"2px 6px"}}, "\u2715")
        ) : null,
        !serverGeladen ? h(Lader) : null,
        ...aktItems.map(item => h(Karte, {
          key:item.id, item, istTee:istTeeTab,
          isAdmin, onLoeschen:id=>loeschen(id,istTeeTab),
          onBestellen:item=>setBestellModal({item,istTee:istTeeTab}),
          onBearbeiten:item=>setEditItem(item),
          onToggleStock:id=>toggleOutOfStock(id,istTeeTab),
          tassenCount:tassen[item.id]||0,
          kommentare:kommentare.filter(k=>k.itemId===item.id),
          onKommentarHinzufuegen:(t,n)=>kommentarHinzufuegen(item.id,t,n),
          onKommentarLoeschen:kommentarLoeschen
        })),
        isAdmin && !editItem ? (formularOffen
          ? h(Formular, {istTee:istTeeTab, onSpeichern:f=>hinzufuegen(f,istTeeTab), onAbbrechen:()=>setFormularOffen(false)})
          : btn({onClick:()=>setFormularOffen(true),style:{width:"100%",background:"transparent",border:"1.5px dashed rgba(160,120,50,0.2)",color:"rgba(160,120,50,0.4)",fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",padding:"16px",cursor:"pointer",borderRadius:3,marginBottom:16}},
              "+ "+(istTeeTab?"Tee":"Kaffee")+" hinzuf\u00fcgen"
            )
        ) : null,
        aktItems.length === 0 && serverGeladen ? div({style:{textAlign:"center",padding:"50px 20px",color:"rgba(160,120,50,0.25)",fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase"}}, hatFilter?"Keine Treffer":"Noch keine Eintr\u00e4ge") : null
      );
    })()
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
